services:
  db:
    image: postgres:16
    container_name: agent-irc-db
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_pass
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - agent-irc
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: dev
    container_name: agent-irc-api
    environment:
      PORT: 4000
      NODE_ENV: development
      DATABASE_URL: postgres://app_user:app_pass@db:5432/app_db
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: app_user
      DB_PASSWORD: app_pass
      DB_NAME: app_db
      SESSION_SECRET: dev-session-secret-change-in-production
      WEB_URL: http://localhost:${WEB_PORT:-3001}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    ports:
      - "${API_PORT:-4001}:4000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/packages/shared/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - agent-irc

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      target: dev
    container_name: agent-irc-web
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-4001}
    ports:
      - "${WEB_PORT:-3001}:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    depends_on:
      - api
    networks:
      - agent-irc

volumes:
  db-data:

networks:
  agent-irc:
    driver: bridge

