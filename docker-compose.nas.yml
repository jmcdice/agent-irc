# docker-compose.nas.yml - Standalone production compose for NAS deployment
# Usage: docker compose -f docker-compose.nas.yml up -d --build
#
# This is a complete standalone file (not an override) to avoid Docker Compose
# merge behavior issues with volumes and ports.

services:
  db:
    image: postgres:16
    container_name: agent-irc-db
    environment:
      POSTGRES_DB: ${DB_NAME:-app_db}
      POSTGRES_USER: ${DB_USER:-app_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-app_pass}
    ports:
      - "${DB_PORT:-5434}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - agent-irc
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app_user} -d ${DB_NAME:-app_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: prod
    container_name: agent-irc-api
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgres://app_user:app_pass@db:5432/app_db}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-app_user}
      DB_PASSWORD: ${DB_PASSWORD:-app_pass}
      DB_NAME: ${DB_NAME:-app_db}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      WEB_URL: ${WEB_URL:-http://192.168.86.39:3001}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://192.168.86.39:3001}
    ports:
      - "${API_PORT:-4001}:4000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - agent-irc
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/healthz"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      target: prod
    container_name: agent-irc-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://192.168.86.39:4001}
    ports:
      - "${WEB_PORT:-3001}:3000"
    depends_on:
      - api
    networks:
      - agent-irc
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

networks:
  agent-irc:
    name: agent-irc

volumes:
  db-data:
