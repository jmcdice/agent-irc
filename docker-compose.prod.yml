# docker-compose.prod.yml - Production overrides
#
# Usage:
#   Build:  docker compose -f docker-compose.yml -f docker-compose.prod.yml build
#   Run:    docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   Stop:   docker compose -f docker-compose.yml -f docker-compose.prod.yml down

services:
  db:
    # Production: restart unless manually stopped
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      # These should be set via .env file or external secrets in production
      DATABASE_URL: ${DATABASE_URL:-postgres://app_user:app_pass@db:5432/app_db}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-app_user}
      DB_PASSWORD: ${DB_PASSWORD:-app_pass}
      DB_NAME: ${DB_NAME:-app_db}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      WEB_URL: ${WEB_URL:-http://localhost:3001}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    # No volume mounts in production - use built image
    volumes: []
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/healthz"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      target: prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    # No volume mounts in production - use built image
    volumes: []
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

